<script>

const PASSWORD = "12345";

let input = "";
let score = 0;

const messages = {

1:
"Heiii...ga ada someone to talk ya? liat TikTok sama IG isinya ikut trend romantis dan yaps kamu pasti bilang 'When ya?' kasian ya...tenang bujang One Day. Lebih baik terlambat bikin trend daripada bertemu yang tidak tepat.",

2:
"Cie...cie ada yang lagi butterfly era nih? senyumnya ga bisa bohong, dia baik banget ya sama kamu? Bahagia selalu ya, I wish senyum yang merekah hari ini akan merekah seterusnya. Happy for you 💖",

3:
"Heii what's wrong? it's okay, nikmati rasa sakitnya nikmati sedihnya, nangis aja gapapa, tapi setelah itu janji bakal jadi lebih kuat. Aku yakin kamu bisa lalui dengan kuat. Merelakan sesuatu yang berusaha pergi dari kamu emang ga mudah, tapi dia juga ga baik buat kamu. Kamu terlalu berharga untuk disakiti. Biarkan dia pergi.",

4:
"lagi capek ya sama dunia? it's okay, dunia emang tempatnya capek,tapi kamu harus tetap percaya disetiap kesulitan pasti ada kemudahan,badainya akan berlalu, di depan sana ada kebahagian yang menanti kamu. Terima kasih ya sudah berjuang sejauh ini, kamu tuh hebat banget...sedikit lagi jangan nyerah. Okay?"

};

const display =
document.getElementById("display");

/* PASSWORD */

document.querySelectorAll(".key")
.forEach(button=>{

button.addEventListener("click",()=>{

const value = button.innerText;

if(value === "⌫"){

input = input.slice(0,-1);

}

else if(value === "💖"){

if(input === PASSWORD){

document
.getElementById("passwordPage")
.classList.add("hidden");

document
.getElementById("gamePage")
.classList.remove("hidden");

startGame();

}

else{

alert("Password salah 💔");
input = "";

}

}

else{

if(input.length < 5){

input += value;

}

}

display.innerText =
"•".repeat(input.length);

});

});

/* GAME */

function startGame(){

const gameArea =
document.getElementById("gameArea");

for(let i=0;i<10;i++){

const heart =
document.createElement("div");

heart.innerHTML = "💖";

heart.classList.add("flying-heart");

heart.style.left =
Math.random()*250 + "px";

heart.style.animationDelay =
Math.random()*5 + "s";

heart.onclick = ()=>{

heart.remove();

score++;

document
.getElementById("score")
.innerText = score + " / 3";

if(score >= 3){

document
.getElementById("gamePage")
.classList.add("hidden");

document
.getElementById("envelopePage")
.classList.remove("hidden");

}

};

gameArea.appendChild(heart);

}

}

/* PETALS */

function createPetals(){

for(let i=0;i<40;i++){

const petal =
document.createElement("div");

petal.innerHTML =
Math.random() > 0.5 ? "🌹" : "💖";

petal.classList.add("petal");

petal.style.left =
Math.random()*100 + "vw";

petal.style.fontSize =
(Math.random()*20 + 20) + "px";

petal.style.animationDuration =
(Math.random()*3 + 4) + "s";

document.body.appendChild(petal);

setTimeout(()=>{

petal.remove();

},7000);

}

}

/* LETTER */

function openLetter(num){

createPetals();

document
.getElementById("envelopePage")
.classList.add("hidden");

document
.getElementById("letterPage")
.classList.remove("hidden");

const message =
messages[num];

let i = 0;

document
.getElementById("text")
.innerHTML = "";

function typeWriter(){

if(i < message.length){

document
.getElementById("text")
.innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,35);

}

}

typeWriter();

}
